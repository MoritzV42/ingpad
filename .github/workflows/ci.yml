name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check
        run: python -m py_compile server.py tools/render_kurzref.py
      - name: Lint (non-blocking)
        run: |
          pip install ruff
          ruff check . || true

  no-pdfs-committed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if any exercise PDF slipped into the repo (copyright guard)
        run: |
          if git ls-files | grep -i '\.pdf$'; then
            echo "::error::A .pdf is tracked — exercise materials must stay gitignored."
            exit 1
          fi
          echo "OK — no PDFs tracked."
